name: Experiment

on:
  workflow_dispatch:
    inputs:
      file:
        required: true
        type: string

jobs:

  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@af83be0ddf1ec3035230c030f3ab6d10a7040515
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@main
      - run: |
          touch ${{ inputs.file }}
          git add -A
          git commit -m "experiment"
          git push
    permissions:
      actions: read
