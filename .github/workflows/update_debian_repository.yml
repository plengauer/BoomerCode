name: Update Debian Repository

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: plengauer/create-debian-repository@2d3d79460d6c590c0f4e0dac6419d268c7d7a83d # v1.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: debian
      - uses: actions/deploy-pages@f806fa6ab355c5e4d1f4bccfe2ea3c9d4a0ba44d # v5.1.0
        id: deployment
